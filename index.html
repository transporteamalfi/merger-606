<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>606 Merger Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const TIPOS_BIENES = [
  { code: "01", label: "01 - GASTOS DE PERSONAL" },
  { code: "02", label: "02 - GASTOS POR TRABAJOS, SUMINISTROS Y SERVICIOS" },
  { code: "03", label: "03 - ARRENDAMIENTOS" },
  { code: "04", label: "04 - GASTOS DE ACTIVOS FIJOS" },
  { code: "05", label: "05 - GASTOS DE REPRESENTACIÓN" },
  { code: "06", label: "06 - OTRAS DEDUCCIONES ADMITIDAS" },
  { code: "07", label: "07 - GASTOS FINANCIEROS" },
  { code: "08", label: "08 - GASTOS EXTRAORDINARIOS" },
  { code: "09", label: "09 - COMPRAS Y GASTOS QUE FORMAN PARTE DEL COSTO DE VENTA" },
  { code: "10", label: "10 - ADQUISICIONES DE ACTIVOS" },
  { code: "11", label: "11 - GASTOS DE SEGUROS" },
];

const FORMAS_PAGO = [
  { code: "01", label: "01 - EFECTIVO" },
  { code: "02", label: "02 - CHEQUES / TRANSFERENCIAS / DEPÓSITO" },
  { code: "03", label: "03 - TARJETA CRÉDITO / DÉBITO" },
  { code: "04", label: "04 - COMPRA A CRÉDITO" },
  { code: "05", label: "05 - PERMUTA" },
  { code: "06", label: "06 - NOTAS DE CRÉDITO" },
  { code: "07", label: "07 - MIXTO" },
];

const norm = (v) => (v == null ? "" : String(v).trim());

const fmtNum = (v) => {
  if (v == null || v === "") return "0.00";
  const n = parseFloat(String(v).replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? "0.00" : n.toFixed(2);
};

// Extraer código de 2 dígitos de un valor tipo "02" o "02 - GASTOS..."
const extractCode = (v) => {
  if (!v) return "";
  const m = String(v).match(/^(\d{1,2})/);
  return m ? m[1].padStart(2, "0") : "";
};

// Buscar fila de encabezado buscando keywords
const findHeaderRow = (rows, keywords, max = 20) => {
  for (let i = 0; i < Math.min(rows.length, max); i++) {
    const row = rows[i];
    if (!row) continue;
    const hits = row.filter(c =>
      c && keywords.some(k => String(c).toUpperCase().includes(k.toUpperCase()))
    );
    if (hits.length >= 2) return i;
  }
  // fallback: al menos 1 match
  for (let i = 0; i < Math.min(rows.length, max); i++) {
    const row = rows[i];
    if (!row) continue;
    if (row.some(c => c && keywords.some(k => String(c).toUpperCase().includes(k.toUpperCase())))) {
      return i;
    }
  }
  return -1;
};

const findCol = (header, keys) =>
  header.findIndex(c => c && keys.some(k => String(c).toUpperCase().includes(k.toUpperCase())));

const resolverFechaPago = (fechaM, fechaD, fpCode) => {
  if (!fechaM || !fechaD) return { pagM: "", pagD: "" };
  const code = String(fpCode).padStart(2, "0");
  if (["01", "02", "03"].includes(code)) {
    return {
      pagM: String(fechaM).split(".")[0],
      pagD: String(fechaD).split(".")[0].padStart(2, "0"),
    };
  }
  if (code === "04") {
    try {
      const s = String(fechaM).split(".")[0];
      const y = parseInt(s.substring(0, 4));
      const mo = parseInt(s.substring(4, 6)) - 1;
      const d = parseInt(fechaD);
      const date = new Date(y, mo, d);
      date.setDate(date.getDate() + 30);
      return {
        pagM: `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, "0")}`,
        pagD: String(date.getDate()).padStart(2, "0"),
      };
    } catch { return { pagM: "", pagD: "" }; }
  }
  return { pagM: "", pagD: "" };
};

function App() {
  const [dgiiMap, setDgiiMap]     = useState({});
  const [dgiiLoaded, setDgiiLoaded] = useState(false);
  const [dgiiCount, setDgiiCount] = useState(0);
  const [editRows, setEditRows]   = useState([]);
  const [rnc, setRnc]             = useState("");
  const [periodo, setPeriodo]     = useState("");
  const [step, setStep]           = useState(0);
  const [globalTipo, setGlobalTipo] = useState("");

  /* ── LEER DGII ───────────────────────────────────────────────── */
  const handleDGII = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

        // Intentar extraer RNC y Período de las primeras filas
        rows.slice(0, 10).forEach(row => {
          if (!row) return;
          const flat = row.map(c => norm(c).toUpperCase()).join(" ");
          if (flat.includes("RNC") && !rnc) {
            const idx = row.findIndex(c => norm(c).toUpperCase().includes("RNC"));
            if (idx >= 0 && row[idx + 1]) setRnc(norm(row[idx + 1]));
          }
          if ((flat.includes("PERÍODO") || flat.includes("PERIODO")) && !periodo) {
            const idx = row.findIndex(c => {
              const s = norm(c).toUpperCase();
              return s.includes("PERÍODO") || s.includes("PERIODO");
            });
            if (idx >= 0 && row[idx + 1]) setPeriodo(norm(row[idx + 1]).split(".")[0]);
          }
        });

        const HDR = ["NCF", "COMPROBANTE", "RNC", "CEDULA", "CÉDULA", "TIPO", "FORMA", "FISCAL"];
        let hdrIdx = findHeaderRow(rows, HDR);
        if (hdrIdx === -1) {
          const preview = (rows[0] || []).slice(0, 6).map(c => norm(c)).join(" | ");
          alert(`No se pudo detectar el encabezado del archivo DGII.\nPrimeras celdas: ${preview}`);
          return;
        }

        const h = rows[hdrIdx];
        const C = {
          rnc:   findCol(h, ["RNC", "CEDULA", "CÉDULA", "PROVEEDOR"]),
          ncf:   findCol(h, ["NCF", "COMPROBANTE FISCAL", "NÚMERO COMPROBANTE", "NUMERO COMPROBANTE"]),
          ncfMod:findCol(h, ["MODIFICADO", "NCF MOD", "DOC MOD"]),
          tipo:  findCol(h, ["TIPO DE BIEN", "TIPO BIEN", "BIENES Y SERVICIOS", "TIPO"]),
          fechaM:findCol(h, ["AAAAMM"]),
          fechaD:findCol(h, ["(DD)", " DD", "FECHA DD"]),
          formaPago: findCol(h, ["FORMA DE PAGO", "FORMA PAGO"]),
        };

        const map = {};
        rows.slice(hdrIdx + 1).forEach(row => {
          if (!row) return;
          const ncf = norm(row[C.ncf]);
          if (ncf.length < 9) return;
          const tipoRaw = C.tipo >= 0 ? norm(row[C.tipo]) : "";
          const fpRaw   = C.formaPago >= 0 ? norm(row[C.formaPago]) : "";
          map[ncf] = {
            rnc:    C.rnc >= 0 ? norm(row[C.rnc]) : "",
            ncf,
            ncfMod: C.ncfMod >= 0 ? norm(row[C.ncfMod]) : "",
            tipo:   extractCode(tipoRaw) || "02",
            fechaM: C.fechaM >= 0 ? norm(row[C.fechaM]) : "",
            fechaD: C.fechaD >= 0 ? norm(row[C.fechaD]) : "",
            fpCode: extractCode(fpRaw) || "02",
          };
        });

        setDgiiMap(map);
        setDgiiLoaded(true);
        setDgiiCount(Object.keys(map).length);
        alert(`✅ DGII cargado: ${Object.keys(map).length} registros`);
      } catch (err) {
        alert("Error leyendo DGII: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── LEER ALEGRA + MERGE ─────────────────────────────────────── */
  const handleAlegra = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

        // Extraer RNC y Período si no están cargados
        rows.slice(0, 10).forEach(row => {
          if (!row) return;
          const r0 = norm(row[0]).toLowerCase();
          if (r0.includes("rnc") && !rnc && row[1]) setRnc(norm(row[1]));
          if ((r0.includes("período") || r0.includes("periodo")) && !periodo && row[1])
            setPeriodo(norm(row[1]).split(".")[0]);
        });

        // Localizar encabezado
        const HDR = ["NCF", "RNC", "MONTO", "FORMA", "AAAAMM", "ITBIS"];
        let hIdx = findHeaderRow(rows, HDR);
        if (hIdx === -1) hIdx = 7; // fallback Alegra clásico

        const h = rows[hIdx] || [];
        const fc = (keys) => findCol(h, keys);

        const C = {
          rnc:  fc(["RNC/CEDULA", "RNC/CÉ", "RNC", "CEDULA"]),
          ncf:  fc(["NCF"]),
          fm:   fc(["AAAAMM"]),
          fd:   fc(["COMPROBANTE (D)", "(D)"]),
          tot:  fc(["TOTAL MONTO", "TOTAL"]),
          fp:   fc(["FORMA DE PAGO", "FORMA PAGO"]),
          itc:  fc(["AL COSTO", "COSTO"]),
          ita:  fc(["ADELANTAR", "ADELANTO"]),
          svc:  fc(["SERVICIOS"]),
          bien: fc(["BIENES"]),
        };

        const merged = [];
        rows.slice(hIdx + 1).forEach(row => {
          if (!row) return;
          const ncf = norm(row[C.ncf]);
          if (!ncf) return;

          // Tomar datos del DGII si están disponibles (por NCF)
          const dgii = dgiiMap[ncf] || {};

          const fechaM = norm(row[C.fm]) || dgii.fechaM || "";
          const fechaD = norm(row[C.fd]) || dgii.fechaD || "";

          // Forma de pago: viene de Alegra, si no del DGII
          const fpRaw = norm(row[C.fp]);
          const fpCode = extractCode(fpRaw) || dgii.fpCode || "02";

          // Tipo Bien: viene del DGII por NCF; si no existe, default 02
          const tipo = dgii.tipo || "02";

          const { pagM, pagD } = resolverFechaPago(fechaM, fechaD, fpCode);

          const itbisC = parseFloat(fmtNum(row[C.itc]));
          const itbisA = parseFloat(fmtNum(row[C.ita]));
          const itbis  = (itbisC + itbisA).toFixed(2);

          merged.push({
            rnc:      norm(row[C.rnc]) || dgii.rnc || "",
            ncf,
            ncfMod:   dgii.ncfMod || "",
            tipo,
            fechaM,
            fechaD,
            montoSvc: fmtNum(row[C.svc]),
            montoBien:fmtNum(row[C.bien]),
            total:    fmtNum(row[C.tot]),
            itbis,
            fpCode,
            pagM,
            pagD,
            // guardar fecha original para recalcular al cambiar forma pago
            _fechaM: fechaM,
            _fechaD: fechaD,
          });
        });

        setEditRows(merged);
        setStep(1);
      } catch (err) {
        alert("Error leyendo Alegra: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── EDICIÓN DE FILAS ────────────────────────────────────────── */
  const updateRow = (i, field, value) => {
    const updated = [...editRows];
    updated[i] = { ...updated[i], [field]: value };
    // Recalcular fecha de pago si cambia la forma de pago
    if (field === "fpCode") {
      const { pagM, pagD } = resolverFechaPago(updated[i]._fechaM, updated[i]._fechaD, value);
      updated[i].pagM = pagM;
      updated[i].pagD = pagD;
    }
    setEditRows(updated);
  };

  const applyGlobalTipo = () => {
    if (!globalTipo) return;
    setEditRows(prev => prev.map(r => ({ ...r, tipo: globalTipo })));
  };

  /* ── GENERAR EXCEL 606 ───────────────────────────────────────── */
  const generarExcel = () => {
    const headers = [
      "RNC o Cédula del Proveedor",
      "Número Comprobante Fiscal",
      "NCF o Doc. Modificado",
      "Tipo de Bienes y Servicios Adquiridos",
      "Fecha Comprobante (AAAAMM)",
      "Fecha Comprobante (DD)",
      "Monto Facturado Servicios",
      "Monto Facturado Bienes",
      "Total Monto Facturado",
      "Monto ITBIS Facturado",
      "ITBIS Retenido por Terceros",
      "ITBIS Percibido",
      "Tipo Retención ISR",
      "Monto Retención Renta",
      "ISR Percibido",
      "Impuesto Selectivo al Consumo",
      "Otros Impuestos/Tasas",
      "Monto Propina Legal",
      "Forma de Pago",
      "Fecha de Pago (AAAAMM)",
      "Fecha de Pago (DD)",
    ];

    const dataRows = editRows.map(r => [
      r.rnc,
      r.ncf,
      r.ncfMod || "",
      r.tipo,
      r.fechaM,
      r.fechaD,
      r.montoSvc  || "0.00",
      r.montoBien || "0.00",
      r.total,
      r.itbis,
      "0.00", // ITBIS retenido
      "0.00", // ITBIS percibido
      "",     // Tipo retención ISR
      "0.00", // Monto retención renta
      "0.00", // ISR percibido
      "0.00", // Imp. Selectivo
      "0.00", // Otros impuestos
      "0.00", // Propina
      r.fpCode,
      r.pagM || "",
      r.pagD || "",
    ]);

    const ws = XLSX.utils.aoa_to_sheet([headers, ...dataRows]);

    ws["!cols"] = [
      { wch: 14 }, { wch: 22 }, { wch: 22 }, { wch: 6 },
      { wch: 10 }, { wch: 6 },  { wch: 16 }, { wch: 16 },
      { wch: 18 }, { wch: 18 }, { wch: 18 }, { wch: 14 },
      { wch: 12 }, { wch: 16 }, { wch: 14 }, { wch: 18 },
      { wch: 16 }, { wch: 14 }, { wch: 6 },  { wch: 10 }, { wch: 8 },
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "606");
    XLSX.writeFile(wb, `606_${periodo || "PERIODO"}_${rnc || "RNC"}.xlsx`);
  };

  /* ── ESTILOS ─────────────────────────────────────────────────── */
  const cardStyle   = { background: "#161b22", padding: "36px", borderRadius: "20px", border: "1px solid #30363d", textAlign: "center" };
  const selectStyle = { background: "#0d1117", color: "#c9d1d9", border: "1px solid #30363d", borderRadius: "6px", padding: "4px 8px", fontSize: "0.74rem", maxWidth: "160px" };
  const badgeStyle  = { fontSize: "0.72rem", fontWeight: "bold", color: "#58a6ff", background: "#1c2d40", padding: "4px 10px", borderRadius: "20px" };

  /* ── RENDER ──────────────────────────────────────────────────── */
  return (
    <div style={{ minHeight: "100vh", backgroundColor: "#0d1117", color: "#c9d1d9", padding: "40px", fontFamily: "sans-serif" }}>
      <header style={{ textAlign: "center", marginBottom: "40px" }}>
        <h1 style={{ color: "white", fontSize: "2.2rem", marginBottom: "8px" }}>606 MERGER PRO 🚛</h1>
        <p style={{ opacity: 0.6, margin: 0 }}>Transporte Amalfi — Unificador de Reportes</p>
      </header>

      {step === 0 ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", maxWidth: "860px", margin: "0 auto" }}>
          {/* Card DGII */}
          <div style={cardStyle}>
            <div style={{ fontSize: "2.5rem", marginBottom: "16px" }}>📊</div>
            <h2 style={{ color: "white", marginBottom: "8px" }}>1. DGII (.xls)</h2>
            <p style={{ fontSize: "0.78rem", opacity: 0.6, marginBottom: "6px" }}>Archivo previo 606 de la DGII.</p>
            <p style={{ fontSize: "0.72rem", color: "#f0883e", marginBottom: "16px" }}>
              Aporta el <strong>Tipo de Bien</strong> y <strong>Forma de Pago</strong> por NCF
            </p>
            <input type="file" accept=".xls,.xlsx" onChange={handleDGII} style={{ fontSize: "0.78rem", color: "#c9d1d9" }} />
            {dgiiLoaded && (
              <span style={{ color: "#3fb950", fontSize: "0.75rem", marginTop: "10px", display: "block" }}>
                ✅ {dgiiCount} registros cargados
              </span>
            )}
            {!dgiiLoaded && (
              <span style={{ color: "#8b949e", fontSize: "0.72rem", marginTop: "10px", display: "block" }}>
                Opcional — si no se carga, Tipo de Bien usará código 02
              </span>
            )}
          </div>

          {/* Card Alegra */}
          <div style={cardStyle}>
            <div style={{ fontSize: "2.5rem", marginBottom: "16px" }}>🚀</div>
            <h2 style={{ color: "white", marginBottom: "8px" }}>2. Alegra (.xlsx)</h2>
            <p style={{ fontSize: "0.78rem", opacity: 0.6, marginBottom: "6px" }}>Reporte exportado desde Alegra.</p>
            <p style={{ fontSize: "0.72rem", color: "#f0883e", marginBottom: "16px" }}>
              Aporta <strong>montos</strong>, <strong>ITBIS</strong> y <strong>fechas</strong>
            </p>
            <input type="file" accept=".xlsx" onChange={handleAlegra} style={{ fontSize: "0.78rem", color: "#c9d1d9" }} />
          </div>
        </div>
      ) : (
        <div style={{ background: "#161b22", borderRadius: "20px", border: "1px solid #30363d", maxWidth: "1200px", margin: "0 auto", padding: "28px" }}>

          {/* Header barra superior */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", flexWrap: "wrap", gap: "12px" }}>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              <span style={badgeStyle}>RNC: {rnc || "—"}</span>
              <span style={badgeStyle}>PERÍODO: {periodo || "—"}</span>
              <span style={badgeStyle}>{editRows.length} registros</span>
              {dgiiLoaded && <span style={{ ...badgeStyle, color: "#3fb950", background: "#12261e" }}>✅ DGII combinado</span>}
            </div>
            <div style={{ display: "flex", gap: "10px" }}>
              <button onClick={() => setStep(0)}
                style={{ background: "#30363d", color: "white", border: "none", padding: "9px 22px", borderRadius: "10px", cursor: "pointer" }}>
                ← Atrás
              </button>
              <button onClick={generarExcel}
                style={{ background: "#238636", color: "white", border: "none", padding: "9px 22px", borderRadius: "10px", cursor: "pointer", fontWeight: "bold" }}>
                ⬇ Descargar Excel 606
              </button>
            </div>
          </div>

          {/* Aplicar tipo bien global */}
          <div style={{ marginBottom: "16px", display: "flex", alignItems: "center", gap: "12px", background: "#0d1117", padding: "12px 16px", borderRadius: "10px", flexWrap: "wrap" }}>
            <span style={{ fontSize: "0.78rem", opacity: 0.7 }}>Aplicar Tipo de Bien a <em>todas</em> las filas:</span>
            <select value={globalTipo} onChange={e => setGlobalTipo(e.target.value)} style={{ ...selectStyle, maxWidth: "280px" }}>
              <option value="">— seleccionar —</option>
              {TIPOS_BIENES.map(t => <option key={t.code} value={t.code}>{t.label}</option>)}
            </select>
            <button onClick={applyGlobalTipo}
              style={{ background: "#1f6feb", color: "white", border: "none", padding: "5px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "0.78rem" }}>
              Aplicar a todos
            </button>
            <span style={{ fontSize: "0.72rem", opacity: 0.4 }}>o edita fila por fila ↓</span>
          </div>

          {/* Tabla editable */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.76rem" }}>
              <thead>
                <tr style={{ color: "#8b949e", borderBottom: "2px solid #30363d", textAlign: "left" }}>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>RNC</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>NCF</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>Tipo Bien</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>Fecha Comp.</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap", textAlign: "right" }}>Total</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap", textAlign: "right" }}>ITBIS</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>Forma de Pago</th>
                  <th style={{ padding: "10px 12px", whiteSpace: "nowrap" }}>Fecha Pago</th>
                </tr>
              </thead>
              <tbody>
                {editRows.map((r, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #21262d", background: i % 2 === 0 ? "transparent" : "#0d111770" }}>
                    <td style={{ padding: "8px 12px", fontFamily: "monospace", fontSize: "0.72rem", color: "#8b949e" }}>
                      {r.rnc || "—"}
                    </td>
                    <td style={{ padding: "8px 12px", fontWeight: "bold", color: "white", whiteSpace: "nowrap" }}>
                      {r.ncf}
                    </td>
                    <td style={{ padding: "8px 12px" }}>
                      <select
                        value={r.tipo}
                        onChange={e => updateRow(i, "tipo", e.target.value)}
                        style={selectStyle}
                      >
                        {TIPOS_BIENES.map(t => (
                          <option key={t.code} value={t.code}>{t.label}</option>
                        ))}
                      </select>
                    </td>
                    <td style={{ padding: "8px 12px", color: "#8b949e", whiteSpace: "nowrap" }}>
                      {r.fechaD}/{r.fechaM}
                    </td>
                    <td style={{ padding: "8px 12px", textAlign: "right", fontFamily: "monospace" }}>
                      {r.total}
                    </td>
                    <td style={{ padding: "8px 12px", textAlign: "right", fontFamily: "monospace", color: "#58a6ff" }}>
                      {r.itbis}
                    </td>
                    <td style={{ padding: "8px 12px" }}>
                      <select
                        value={r.fpCode}
                        onChange={e => updateRow(i, "fpCode", e.target.value)}
                        style={selectStyle}
                      >
                        {FORMAS_PAGO.map(f => (
                          <option key={f.code} value={f.code}>{f.label}</option>
                        ))}
                      </select>
                    </td>
                    <td style={{ padding: "8px 12px", color: "#3fb950", whiteSpace: "nowrap", fontFamily: "monospace" }}>
                      {r.pagD && r.pagM ? `${r.pagD}/${r.pagM}` : "—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <footer style={{ textAlign: "center", marginTop: "40px", opacity: 0.3, fontSize: "0.75rem" }}>
        606 Merger Pro · Transporte Amalfi
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
