<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>606 Merger Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const TIPOS_BIENES = [
  { code:"01", label:"01- GASTOS DE PERSONAL" },
  { code:"02", label:"02-GASTOS POR TRABAJOS, SUMINISTROS Y SERVICIOS" },
  { code:"03", label:"03-ARRENDAMIENTOS" },
  { code:"04", label:"04- GASTOS DE ACTIVOS FIJOS" },
  { code:"05", label:"05 -GASTOS DE REPRESENTACIÓN" },
  { code:"06", label:"06-OTRAS DEDUCCIONES ADMITIDAS" },
  { code:"07", label:"07 -GASTOS FINANCIEROS" },
  { code:"08", label:"08 -GASTOS EXTRAORDINARIOS" },
  { code:"09", label:"09 -COMPRAS Y GASTOS QUE FORMAN PARTE DEL COSTO DE VENTA" },
  { code:"10", label:"10 -ADQUISICIONES DE ACTIVOS" },
  { code:"11", label:"11- GASTOS DE SEGUROS" },
];

const FORMAS_PAGO = [
  { code:"01", label:"01 - EFECTIVO" },
  { code:"02", label:"02 - CHEQUES/TRANSFERENCIAS/DEPÓSITO" },
  { code:"03", label:"03 - TARJETA CRÉDITO/DÉBITO" },
  { code:"04", label:"04 - COMPRA A CREDITO" },
  { code:"05", label:"05 -  PERMUTA" },
  { code:"06", label:"06 - NOTA DE CREDITO" },
  { code:"07", label:"07 - MIXTO" },
];

const TIPOS_ISR = [
  { code:"",   label:"" },
  { code:"01", label:"01 - ALQUILERES" },
  { code:"02", label:"02 - HONORARIOS POR SERVICIOS" },
  { code:"03", label:"03 - OTRAS RENTAS" },
  { code:"04", label:"04 - OTRAS RENTAS (Rentas Presuntas)" },
  { code:"05", label:"05 - INTERESES PAGADOS A PERSONAS FÍSICAS" },
  { code:"06", label:"06 - INTERESES PAGADOS A ENTIDADES EXENTAS" },
  { code:"07", label:"07 - RETENCIÓN POR PROVEEDORES DEL ESTADO" },
  { code:"08", label:"08 - JUEGOS TELEFONICOS" },
  { code:"09", label:"09 - RETENCIONES SUBSECTOR AGROPECUARIO" },
];

// ── Utilidades ──────────────────────────────────────────────────
const norm = (v) => (v == null ? "" : String(v).replace(/^'+|'+$/g,"").trim());

const num = (v) => {
  const n = parseFloat(norm(v).replace(/[^0-9.-]/g,""));
  return isNaN(n) ? "0.00" : n.toFixed(2);
};

// "202603.0" → "202603"
const normM = (v) => norm(v).split(".")[0].replace(/\D/g,"").substring(0,6);

// "5.0" o "05" o 5 → "05"
const normD = (v) => {
  const s = norm(v).split(".")[0].replace(/\D/g,"");
  return s ? s.padStart(2,"0") : "";
};

// "02-GASTOS..." o 2 o "2" o "02" → "02"
const normTipo = (v) => {
  const m = norm(v).match(/^(\d{1,2})/);
  return m ? m[1].padStart(2,"0") : "02";
};

// "03 - TARJETA..." o 3 o "03" → "03"
const normFP = (v) => {
  const m = norm(v).match(/^(\d{1,2})/);
  return m ? m[1].padStart(2,"0") : "02";
};

const calcPago = (fechaM, fechaD, fpCode) => {
  const code = normFP(fpCode);
  if (!fechaM || fechaM.length < 6) return { pagM:"", pagD:"" };
  if (["01","02","03"].includes(code)) return { pagM:fechaM, pagD:fechaD };
  if (code === "04") {
    try {
      const y = parseInt(fechaM.substring(0,4));
      const mo = parseInt(fechaM.substring(4,6))-1;
      const d = parseInt(fechaD)||1;
      const dt = new Date(y,mo,d);
      dt.setDate(dt.getDate()+30);
      return { pagM:`${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,"0")}`, pagD:String(dt.getDate()).padStart(2,"0") };
    } catch { return { pagM:"", pagD:"" }; }
  }
  return { pagM:fechaM, pagD:fechaD };
};

// ── Parser DGII ─────────────────────────────────────────────────
// Hoja: "Herramienta Formato 606"
// Fila 3 col 2 = RNC empresa | Fila 4 col 2 = Periodo
// Header: fila 10 | Datos: desde fila 11
// Cols: 1=RNC,2=TipoId,3=TipoBien,4=NCF,5=NCFMod,
//       6=FechaCompM,7=FechaCompD,8=FechaPagoM,9=FechaPagoD,
//       10=MontoSvc,11=MontoBien,12=Total,13=ITBIS,14=ITBISRet,
//       15=ITBISProp,16=ITBISCosto,17=ITBISAdel,18=ITBISPerc,
//       19=TipoISR,20=MontoRet,21=ISRPerc,22=ISC,23=Otros,24=Propina,25=FP
const parseDGII = (buf) => {
  const wb = XLSX.read(buf, { type:"array" });
  const shName = wb.SheetNames.find(n => n.includes("606") || n.toLowerCase().includes("herramienta")) || wb.SheetNames[0];
  const ws = wb.Sheets[shName];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:true });

  let rncEmp = "", periodo = "";
  // Fila 3: RNC en col 2
  if (rows[3]) rncEmp = norm(rows[3][2]).replace(/\D/g,"");
  // Fila 4: Periodo en col 2
  if (rows[4]) periodo = normM(rows[4][2]);

  const records = [];
  for (let i = 11; i < rows.length; i++) {
    const r = rows[i] || [];
    const ncf = norm(r[4]);
    if (ncf.length < 9) continue;

    const fechaM = normM(r[6]);
    const fechaD = normD(r[7]);
    const fpCode = normFP(r[25]);
    let pagM = normM(r[8]);
    let pagD = normD(r[9]);
    if (!pagM) { const c = calcPago(fechaM,fechaD,fpCode); pagM=c.pagM; pagD=c.pagD; }

    records.push({
      source:"DGII",
      rnc:norm(r[1]).replace(/\D/g,""), tipoId:norm(r[2])||"1",
      tipo:normTipo(r[3]), ncf, ncfMod:norm(r[5]),
      fechaM, fechaD, pagM, pagD,
      montoSvc:num(r[10]), montoBien:num(r[11]), total:num(r[12]),
      itbis:num(r[13]), itbisRet:num(r[14]), itbisProp:num(r[15]),
      itbisCosto:num(r[16]), itbisAdel:num(r[17]), itbisPerc:num(r[18]),
      tipoISR:norm(r[19]), montoRet:num(r[20]), isrPerc:num(r[21]),
      isc:num(r[22]), otros:num(r[23]), propina:num(r[24]),
      fpCode, _fechaM:fechaM, _fechaD:fechaD,
    });
  }
  return { records, rncEmp, periodo };
};

// ── Parser Alegra ───────────────────────────────────────────────
// Hoja activa (Sheet1)
// Fila 3 (idx 2) col B = RNC | Fila 4 (idx 3) col B = Periodo
// Header: fila 8 (idx 7) | Datos: desde idx 8
// Cols: 0=Línea,1=RNC,2=TipoId,3=TipoBien,4=NCF,5=NCFMod,
//       6=FechaCompM,7=FechaCompD,8=FechaPagoM,9=FechaPagoD,
//       10=MontoSvc,11=MontoBien,12=Total,13=ITBIS,14=ITBISRet,
//       15=ITBISProp,16=ITBISCosto,17=ITBISAdel,18=ITBISPerc,
//       19=TipoISR,20=MontoRet,21=ISRPerc,22=ISC,23=Otros,24=Propina,25=FP
const parseAlegra = (buf) => {
  const wb = XLSX.read(buf, { type:"array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:false });

  let rncEmp = "", periodo = "";
  for (let i = 0; i < Math.min(8, rows.length); i++) {
    const r = rows[i] || [];
    const r0 = norm(r[0]).toLowerCase();
    if (r0.includes("rnc") && r[1]) rncEmp = norm(r[1]).replace(/\D/g,"");
    if ((r0.includes("período")||r0.includes("periodo")) && r[1]) periodo = normM(r[1]);
  }

  const records = [];
  for (let i = 8; i < rows.length; i++) {
    const r = rows[i] || [];
    const ncf = norm(r[4]);
    if (ncf.length < 9) continue;

    const fechaM = normM(r[6]);
    const fechaD = normD(r[7]);
    const fpCode = normFP(r[25]);
    let pagM = normM(r[8]);
    let pagD = normD(r[9]);
    if (!pagM) { const c = calcPago(fechaM,fechaD,fpCode); pagM=c.pagM; pagD=c.pagD; }

    records.push({
      source:"Alegra",
      rnc:norm(r[1]).replace(/\D/g,""), tipoId:norm(r[2])||"1",
      tipo:normTipo(r[3]), ncf, ncfMod:norm(r[5]),
      fechaM, fechaD, pagM, pagD,
      montoSvc:num(r[10]), montoBien:num(r[11]), total:num(r[12]),
      itbis:num(r[13]), itbisRet:num(r[14]), itbisProp:num(r[15]),
      itbisCosto:num(r[16]), itbisAdel:num(r[17]), itbisPerc:num(r[18]),
      tipoISR:norm(r[19]), montoRet:num(r[20]), isrPerc:num(r[21]),
      isc:num(r[22]), otros:num(r[23]), propina:num(r[24]),
      fpCode, _fechaM:fechaM, _fechaD:fechaD,
    });
  }
  return { records, rncEmp, periodo };
};

// ── App ─────────────────────────────────────────────────────────
function App() {
  const [dgiiRec,   setDgiiRec]   = useState(null);
  const [alegraRec, setAlegraRec] = useState(null);
  const [rncEmp,    setRncEmp]    = useState("");
  const [periodo,   setPeriodo]   = useState("");
  const [editRows,  setEditRows]  = useState([]);
  const [step,      setStep]      = useState(0);
  const [globalTipo,setGlobalTipo]= useState("");
  const [filter,    setFilter]    = useState("all");

  const handleDGII = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const { records, rncEmp, periodo } = parseDGII(ev.target.result);
        setDgiiRec(records);
        if (rncEmp)  setRncEmp(rncEmp);
        if (periodo) setPeriodo(periodo);
        alert(`✅ DGII cargado: ${records.length} registros`);
      } catch(err) { alert("Error DGII: " + err.message); }
    };
    reader.readAsArrayBuffer(f);
  };

  const handleAlegra = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const { records, rncEmp, periodo: p } = parseAlegra(ev.target.result);
        setAlegraRec(records);
        if (rncEmp && !rncEmp) setRncEmp(rncEmp);
        if (p && !periodo)     setPeriodo(p);
        if (rncEmp) setRncEmp(prev => prev || rncEmp);
        if (p)      setPeriodo(prev => prev || p);
        alert(`✅ Alegra cargado: ${records.length} registros`);
      } catch(err) { alert("Error Alegra: " + err.message); }
    };
    reader.readAsArrayBuffer(f);
  };

  const doMerge = () => {
    if (!dgiiRec && !alegraRec) { alert("Carga al menos un archivo."); return; }
    const combined = [...(dgiiRec||[]), ...(alegraRec||[])].map(r => {
      const row = { ...r };
      // Facturas a crédito (04): calcular fecha pago +30 días
      if (row.fpCode === "04") {
        const { pagM, pagD } = calcPago(row.fechaM, row.fechaD, "04");
        row.pagM = pagM;
        row.pagD = pagD;
      }
      // Total = servicios + bienes (siempre recalculado)
      const svc  = parseFloat(row.montoSvc)  || 0;
      const bien = parseFloat(row.montoBien) || 0;
      row.total = (svc + bien).toFixed(2);
      // ITBIS llevado al costo = ITBIS facturado
      row.itbisCosto = row.itbis;
      return row;
    });

    // Ordenar por fecha comprobante (AAAAMM + DD)
    combined.sort((a, b) => {
      const fa = (a.fechaM || "000000") + (a.fechaD || "00");
      const fb = (b.fechaM || "000000") + (b.fechaD || "00");
      return fa.localeCompare(fb);
    });

    setEditRows(combined);
    setStep(1);
  };

  const updateRow = (i, field, val) => {
    const up = [...editRows];
    up[i] = { ...up[i], [field]:val };
    if (field === "fpCode") {
      // Recalcular fecha pago según nueva forma
      const { pagM, pagD } = calcPago(up[i]._fechaM, up[i]._fechaD, val);
      up[i].pagM = pagM;
      up[i].pagD = pagD;
    }
    setEditRows(up);
  };

  const applyGlobalTipo = () => {
    if (!globalTipo) return;
    setEditRows(prev => prev.map(r => ({...r, tipo:globalTipo})));
  };

  const generarExcel = () => {
    // Helpers para obtener etiqueta completa
    const tipoLabel = (code) => TIPOS_BIENES.find(t => t.code === code)?.label || code;
    const fpLabel   = (code) => FORMAS_PAGO.find(f => f.code === code)?.label || code;
    const isrLabel  = (val)  => {
      if (!val) return "";
      const found = TIPOS_ISR.find(t => t.label === val || t.code === val.split(" - ")[0]?.trim());
      return found ? found.label : val;
    };

    const colHeaders = [
      "Número Línea","RNC o Cédula del Proveedor","Tipo de Identificación",
      "Tipo de Bienes y Servicios Adquiridos","Número Comprobante Fiscal",
      "NCF ó Documento Modificado","Fecha Comprobante (AAAAMM)","Fecha Comprobante (DD)",
      "Fecha de Pago (AAAAMM)","Fecha de Pago (DD)",
      "Monto Facturado en Servicios","Monto Facturado en Bienes","Total Monto Facturado",
      "ITBIS Facturado","ITBIS Retenido","ITBIS sujeto a Proporcionalidad",
      "ITBIS llevado al Costo","ITBIS por Adelantar","ITBIS Percibido en Compras",
      "Tipo de Retención en ISR","Monto Retención Renta","ISR Percibido en Compras",
      "Impuesto Selectivo al Consumo","Otros Impuesto/Tasas","Monto Propina Legal",
      "Forma de Pago",
    ];

    // Convierte string a número real para Excel; celdas vacías quedan como ""
    const n = (v) => { const x = parseFloat(v); return isNaN(x) ? 0 : x; };

    const data = editRows.map((r,i) => [
      i+1, r.rnc, r.tipoId||"1",
      tipoLabel(r.tipo),               // texto completo
      r.ncf, r.ncfMod||"",
      r.fechaM, r.fechaD,
      r.pagM||"", r.pagD||"",
      n(r.montoSvc), n(r.montoBien), n(r.total),
      n(r.itbis), n(r.itbisRet), n(r.itbisProp),
      n(r.itbisCosto), n(r.itbisAdel), n(r.itbisPerc),
      isrLabel(r.tipoISR),             // texto completo
      n(r.montoRet), n(r.isrPerc), n(r.isc), n(r.otros), n(r.propina),
      fpLabel(r.fpCode),               // texto completo
    ]);

    // Encabezado igual al formato DGII
    const totalMonto = editRows.reduce((s,r) => s + (parseFloat(r.montoSvc)||0) + (parseFloat(r.montoBien)||0), 0).toFixed(2);
    const headerRows = [
      [],
      ["", "", "", "", "Formato de Envío de Compras de Bienes y Servicios"],
      ["RNC o Cédula", "", rncEmp],
      ["Periodo",      "", periodo],
      ["Cantidad Registros", "", editRows.length],
      ["Total Monto Facturado", "", totalMonto],
      [],
      [],
      colHeaders,
      ...data,
    ];

    const ws = XLSX.utils.aoa_to_sheet(headerRows);
    ws["!cols"] = [
      {wch:7},{wch:14},{wch:5},{wch:45},{wch:20},{wch:20},
      {wch:10},{wch:5},{wch:10},{wch:5},
      {wch:14},{wch:14},{wch:16},{wch:14},{wch:12},{wch:16},
      {wch:14},{wch:14},{wch:16},{wch:30},{wch:14},{wch:14},
      {wch:16},{wch:14},{wch:14},{wch:30},
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "606");
    XLSX.writeFile(wb, `606_${periodo||"PERIODO"}_${rncEmp||"RNC"}.xlsx`);
  };

  // Estilos
  const S = {
    card: {background:"#161b22",padding:"30px",borderRadius:"16px",border:"1px solid #30363d",textAlign:"center"},
    sel:  {background:"#0d1117",color:"#c9d1d9",border:"1px solid #30363d",borderRadius:"6px",padding:"3px 6px",fontSize:"0.72rem"},
    badge:(color,bg)=>({fontSize:"0.70rem",fontWeight:"bold",color,background:bg,padding:"3px 9px",borderRadius:"20px"}),
    btn:  (bg)=>({background:bg,color:"white",border:"none",padding:"8px 18px",borderRadius:"8px",cursor:"pointer",fontWeight:"bold",fontSize:"0.80rem"}),
  };

  const vis = filter==="all" ? editRows : editRows.filter(r=>r.source.toLowerCase()===filter);
  const nDGII   = editRows.filter(r=>r.source==="DGII").length;
  const nAlegra = editRows.filter(r=>r.source==="Alegra").length;

  return (
    <div style={{minHeight:"100vh",backgroundColor:"#0d1117",color:"#c9d1d9",padding:"34px",fontFamily:"sans-serif"}}>
      <header style={{textAlign:"center",marginBottom:"32px"}}>
        <h1 style={{color:"white",fontSize:"1.9rem",margin:"0 0 5px 0"}}>606 MERGER PRO 🚛</h1>
        <p style={{opacity:0.45,margin:0,fontSize:"0.83rem"}}>Transporte Amalfi — Unificador de Reportes</p>
      </header>

      {/* PASO 0 */}
      {step===0 && (
        <div style={{maxWidth:"820px",margin:"0 auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}}>

            <div style={S.card}>
              <div style={{fontSize:"2rem",marginBottom:"10px"}}>📊</div>
              <h2 style={{color:"white",margin:"0 0 6px 0",fontSize:"1.15rem"}}>1. DGII (.xls)</h2>
              <p style={{fontSize:"0.74rem",opacity:0.5,margin:"0 0 3px 0"}}>Herramienta Formato 606 de la DGII</p>
              <p style={{fontSize:"0.69rem",color:"#f0883e",margin:"0 0 14px 0"}}>
                Lee la hoja "Herramienta Formato 606"
              </p>
              <input type="file" accept=".xls,.xlsx" onChange={handleDGII}
                style={{fontSize:"0.74rem",color:"#c9d1d9"}} />
              {dgiiRec && (
                <div style={{marginTop:"9px",color:"#3fb950",fontSize:"0.72rem"}}>
                  ✅ {dgiiRec.length} registros
                </div>
              )}
            </div>

            <div style={S.card}>
              <div style={{fontSize:"2rem",marginBottom:"10px"}}>🚀</div>
              <h2 style={{color:"white",margin:"0 0 6px 0",fontSize:"1.15rem"}}>2. Alegra (.xlsx)</h2>
              <p style={{fontSize:"0.74rem",opacity:0.5,margin:"0 0 3px 0"}}>Reporte 606 exportado desde Alegra</p>
              <p style={{fontSize:"0.69rem",color:"#f0883e",margin:"0 0 14px 0"}}>
                Encabezado en fila 8 · datos desde fila 9
              </p>
              <input type="file" accept=".xlsx,.xls" onChange={handleAlegra}
                style={{fontSize:"0.74rem",color:"#c9d1d9"}} />
              {alegraRec && (
                <div style={{marginTop:"9px",color:"#3fb950",fontSize:"0.72rem"}}>
                  ✅ {alegraRec.length} registros
                </div>
              )}
            </div>
          </div>

          {(dgiiRec||alegraRec) && (
            <div style={{background:"#161b22",borderRadius:"12px",border:"1px solid #30363d",padding:"16px 20px"}}>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}}>
                {dgiiRec   && <span style={S.badge("#79c0ff","#1c2d40")}>DGII: {dgiiRec.length}</span>}
                {alegraRec && <span style={S.badge("#d2a8ff","#2d1f3d")}>Alegra: {alegraRec.length}</span>}
                {dgiiRec&&alegraRec && <span style={S.badge("#3fb950","#12261e")}>Total: {dgiiRec.length+alegraRec.length}</span>}
                {rncEmp  && <span style={S.badge("#58a6ff","#1c2d40")}>RNC: {rncEmp}</span>}
                {periodo && <span style={S.badge("#58a6ff","#1c2d40")}>Período: {periodo}</span>}
              </div>
              <button onClick={doMerge} style={{...S.btn("#238636"),padding:"10px 26px",fontSize:"0.88rem"}}>
                Combinar y revisar →
              </button>
            </div>
          )}
        </div>
      )}

      {/* PASO 1 */}
      {step===1 && (
        <div style={{background:"#161b22",borderRadius:"16px",border:"1px solid #30363d",maxWidth:"1300px",margin:"0 auto",padding:"22px"}}>

          {/* Top bar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"10px"}}>
            <div style={{display:"flex",gap:"7px",flexWrap:"wrap",alignItems:"center"}}>
              <span style={S.badge("#58a6ff","#1c2d40")}>RNC: {rncEmp}</span>
              <span style={S.badge("#58a6ff","#1c2d40")}>Período: {periodo}</span>
              <span style={S.badge("#3fb950","#12261e")}>Total: {editRows.length}</span>
              <span style={S.badge("#79c0ff","#1c2d40")}>DGII: {nDGII}</span>
              <span style={S.badge("#d2a8ff","#2d1f3d")}>Alegra: {nAlegra}</span>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={()=>setStep(0)} style={S.btn("#30363d")}>← Atrás</button>
              <button onClick={generarExcel}   style={S.btn("#238636")}>⬇ Descargar Excel 606</button>
            </div>
          </div>

          {/* Controles */}
          <div style={{display:"flex",gap:"14px",flexWrap:"wrap",alignItems:"center",background:"#0d1117",padding:"9px 14px",borderRadius:"9px",marginBottom:"12px"}}>
            <span style={{fontSize:"0.74rem",opacity:0.55}}>Tipo de Bien (todas las filas):</span>
            <select value={globalTipo} onChange={e=>setGlobalTipo(e.target.value)} style={{...S.sel,maxWidth:"260px"}}>
              <option value="">— seleccionar —</option>
              {TIPOS_BIENES.map(t=><option key={t.code} value={t.code}>{t.label}</option>)}
            </select>
            <button onClick={applyGlobalTipo} style={S.btn("#1f6feb")}>Aplicar a todas</button>
            <div style={{marginLeft:"auto",display:"flex",gap:"6px"}}>
              {[["all",`Todas (${editRows.length})`],["dgii",`DGII (${nDGII})`],["alegra",`Alegra (${nAlegra})`]].map(([f,label])=>(
                <button key={f} onClick={()=>setFilter(f)}
                  style={{...S.btn(filter===f?"#1f6feb":"#30363d"),padding:"4px 12px",fontWeight:filter===f?"bold":"normal"}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Tabla */}
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.73rem"}}>
              <thead>
                <tr style={{color:"#8b949e",borderBottom:"2px solid #30363d",textAlign:"left"}}>
                  <th style={{padding:"8px 9px"}}>#</th>
                  <th style={{padding:"8px 9px"}}>Fuente</th>
                  <th style={{padding:"8px 9px"}}>RNC</th>
                  <th style={{padding:"8px 9px"}}>NCF</th>
                  <th style={{padding:"8px 9px",minWidth:"200px"}}>Tipo de Bienes</th>
                  <th style={{padding:"8px 9px",whiteSpace:"nowrap"}}>F. Comp.</th>
                  <th style={{padding:"8px 9px",textAlign:"right"}}>Total</th>
                  <th style={{padding:"8px 9px",textAlign:"right"}}>ITBIS</th>
                  <th style={{padding:"8px 9px",minWidth:"220px"}}>Forma de Pago</th>
                  <th style={{padding:"8px 9px",minWidth:"200px"}}>Retención ISR</th>
                  <th style={{padding:"8px 9px",whiteSpace:"nowrap"}}>F. Pago</th>
                </tr>
              </thead>
              <tbody>
                {vis.map((r, vi) => {
                  const i = editRows.indexOf(r);
                  const isDGII = r.source==="DGII";
                  return (
                    <tr key={i} style={{borderBottom:"1px solid #21262d",background:vi%2===0?"transparent":"#0d111760"}}>
                      <td style={{padding:"6px 9px",color:"#8b949e"}}>{i+1}</td>
                      <td style={{padding:"6px 9px"}}>
                        <span style={{
                          fontSize:"0.67rem",fontWeight:"bold",padding:"2px 7px",borderRadius:"10px",
                          background:isDGII?"#1c2d40":"#2d1f3d",color:isDGII?"#79c0ff":"#d2a8ff"
                        }}>{r.source}</span>
                      </td>
                      <td style={{padding:"6px 9px",fontFamily:"monospace",fontSize:"0.70rem",color:"#8b949e"}}>{r.rnc}</td>
                      <td style={{padding:"6px 9px",fontWeight:"bold",color:"white",whiteSpace:"nowrap",fontSize:"0.72rem"}}>{r.ncf}</td>
                      <td style={{padding:"6px 9px"}}>
                        <select value={r.tipo} onChange={e=>updateRow(i,"tipo",e.target.value)} style={{...S.sel,width:"100%"}}>
                          {TIPOS_BIENES.map(t=><option key={t.code} value={t.code}>{t.label}</option>)}
                        </select>
                      </td>
                      <td style={{padding:"6px 9px",color:"#8b949e",whiteSpace:"nowrap",fontFamily:"monospace",fontSize:"0.70rem"}}>
                        {r.fechaD}/{r.fechaM}
                      </td>
                      <td style={{padding:"6px 9px",textAlign:"right",fontFamily:"monospace"}}>{r.total}</td>
                      <td style={{padding:"6px 9px",textAlign:"right",fontFamily:"monospace",color:"#58a6ff"}}>{r.itbis}</td>
                      <td style={{padding:"6px 9px"}}>
                        <select value={r.fpCode} onChange={e=>updateRow(i,"fpCode",e.target.value)} style={{...S.sel,width:"100%"}}>
                          {FORMAS_PAGO.map(f=><option key={f.code} value={f.code}>{f.label}</option>)}
                        </select>
                      </td>
                      <td style={{padding:"6px 9px"}}>
                        <select value={r.tipoISR||""} onChange={e=>updateRow(i,"tipoISR",e.target.value)} style={{...S.sel,width:"100%"}}>
                          {TIPOS_ISR.map(t=><option key={t.code} value={t.label}>{t.label}</option>)}
                        </select>
                      </td>
                      <td style={{padding:"6px 9px",fontFamily:"monospace",fontSize:"0.70rem",color:"#3fb950",whiteSpace:"nowrap"}}>
                        {r.pagM ? `${r.pagD}/${r.pagM}` : "—"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{marginTop:"12px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
            <span style={{fontSize:"0.72rem",opacity:0.4}}>
              Mostrando {vis.length} de {editRows.length} registros
            </span>
            <button onClick={generarExcel} style={{...S.btn("#238636"),padding:"9px 22px"}}>
              ⬇ Descargar Excel 606 ({editRows.length} registros)
            </button>
          </div>
        </div>
      )}

      <footer style={{textAlign:"center",marginTop:"32px",opacity:0.2,fontSize:"0.71rem"}}>
        606 Merger Pro · Transporte Amalfi
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
