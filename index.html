<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>606 Merger Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0">
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const TIPOS_BIENES = [
  { code: "01", label: "01 - GASTOS DE PERSONAL" },
  { code: "02", label: "02 - GASTOS POR TRABAJOS, SUMINISTROS Y SERVICIOS" },
  { code: "03", label: "03 - ARRENDAMIENTOS" },
  { code: "04", label: "04 - GASTOS DE ACTIVOS FIJOS" },
  { code: "05", label: "05 - GASTOS DE REPRESENTACIÓN" },
  { code: "06", label: "06 - OTRAS DEDUCCIONES ADMITIDAS" },
  { code: "07", label: "07 - GASTOS FINANCIEROS" },
  { code: "08", label: "08 - GASTOS EXTRAORDINARIOS" },
  { code: "09", label: "09 - COMPRAS Y GASTOS QUE FORMAN PARTE DEL COSTO DE VENTA" },
  { code: "10", label: "10 - ADQUISICIONES DE ACTIVOS" },
  { code: "11", label: "11 - GASTOS DE SEGUROS" },
];

const FORMAS_PAGO = [
  { code: "01", label: "01 - EFECTIVO" },
  { code: "02", label: "02 - CHEQUES / TRANSFERENCIAS / DEPÓSITO" },
  { code: "03", label: "03 - TARJETA CRÉDITO / DÉBITO" },
  { code: "04", label: "04 - COMPRA A CRÉDITO" },
  { code: "05", label: "05 - PERMUTA" },
  { code: "06", label: "06 - NOTAS DE CRÉDITO" },
  { code: "07", label: "07 - MIXTO" },
];

const normalize = (v) => (v == null ? "" : String(v).trim());
const fmtNum = (v) => {
  if (v == null || v === "") return "0.00";
  const n = parseFloat(String(v).replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? "0.00" : n.toFixed(2);
};
const resolverFechaPago = (aaaamm, dd, formaPagoLabel) => {
  if (!aaaamm || !dd) return { m: "", d: "" };
  const code = String(formaPagoLabel).split(" - ")[0];
  if (["01", "02", "03"].includes(code)) {
    return { m: aaaamm.split(".")[0], d: dd.split(".")[0].padStart(2, "0") };
  }
  if (code === "04") {
    try {
      const y = parseInt(aaaamm.substring(0, 4));
      const m = parseInt(aaaamm.substring(4, 6)) - 1;
      const d = parseInt(dd);
      const date = new Date(y, m, d);
      date.setDate(date.getDate() + 30);
      return {
        m: `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,"0")}`,
        d: String(date.getDate()).padStart(2, "0"),
      };
    } catch(e) { return { m: "", d: "" }; }
  }
  return { m: "", d: "" };
};

function App() {
  const [dgiiData, setDgiiData] = useState([]);
  const [mergedData, setMergedData] = useState(null);
  const [rnc, setRnc] = useState("");
  const [periodo, setPeriodo] = useState("");
  const [step, setStep] = useState(0);
  const [tipoBien, setTipoBien] = useState("02");
  const [editRows, setEditRows] = useState([]);

  const handleDGII = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const XLSX = window.XLSX;
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      let hdrIdx = rows.findIndex(r => r && r.some(c => String(c).toUpperCase().includes("NCF")));
      if (hdrIdx === -1) return alert("No se encontró columna NCF en el archivo DGII.");
      const h = rows[hdrIdx];
      const fc = (ks) => h.findIndex(c => c && ks.some(k => String(c).toLowerCase().includes(k.toLowerCase())));
      const ci = { rnc: fc(["rnc","cedula"]), ncf: fc(["ncf"]) };
      const records = rows.slice(hdrIdx+1).filter(r => normalize(r[ci.ncf]).length >= 9)
        .map(r => ({ rnc: normalize(r[ci.rnc]), ncf: normalize(r[ci.ncf]) }));
      setDgiiData(records);
      alert(`✅ DGII cargado: ${records.length} registros`);
    };
    reader.readAsArrayBuffer(file);
  };

  const handleAlegra = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const XLSX = window.XLSX;
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      const hIdx = 7;
      const h = rows[hIdx] || [];
      const fc = (s) => h.findIndex(c => c && String(c).toLowerCase().includes(s.toLowerCase()));
      const COL = {
        rnc: fc("rnc/cedula"), ncf: fc("ncf"), fm: fc("aaaamm"),
        fd: fc("comprobante (d)"), tot: fc("total monto"),
        fp: fc("forma de pago"), itc: fc("al costo"), ita: fc("adelantar"),
      };
      rows.slice(0, 10).forEach(row => {
        if (!row) return;
        if (normalize(row[0]).toLowerCase().includes("rnc")) setRnc(normalize(row[1]));
        if (normalize(row[0]).toLowerCase().includes("período")) setPeriodo(normalize(row[1]).split(".")[0]);
      });
      const data = rows.slice(hIdx+1).filter(r => r && normalize(r[COL.ncf])).map(r => {
        const fp = normalize(r[COL.fp]);
        const { m: pm, d: pd } = resolverFechaPago(normalize(r[COL.fm]), normalize(r[COL.fd]), fp);
        const itbisVal = (parseFloat(fmtNum(r[COL.itc])) + parseFloat(fmtNum(r[COL.ita]))).toFixed(2);
        return { rnc: normalize(r[COL.rnc]), ncf: normalize(r[COL.ncf]), pm, pd, tot: fmtNum(r[COL.tot]), itbisC: itbisVal, fp, tipoBien: "02" };
      });
      setMergedData(data);
      setEditRows(data.map(r => ({ ...r })));
      setStep(1);
    };
    reader.readAsArrayBuffer(file);
  };

  const updateRow = (i, field, value) => {
    const updated = [...editRows];
    updated[i] = { ...updated[i], [field]: value };
    if (field === "fp") {
      const row = mergedData[i];
      const { m, d } = resolverFechaPago(row.pm, row.pd, value);
      updated[i].pm = m; updated[i].pd = d;
    }
    setEditRows(updated);
  };

  const generarTXT = () => {
    const lines = editRows.map(r => {
      const fpCode = String(r.fp).split(" - ")[0].padStart(2, "0");
      return [
        rnc.padEnd(11), r.ncf.padEnd(19),
        r.ncf.substring(0,3) === "B11" ? r.ncf.padEnd(19) : "".padEnd(19),
        r.tipoBien.padStart(2,"0"), (r.pm||"").padEnd(6), (r.pd||"").padEnd(2),
        r.tot.padStart(16), "0.00".padStart(16), r.itbisC.padStart(16),
        "0.00".padStart(16), "0.00".padStart(16), "0.00".padStart(16),
        fpCode, (r.pm||"").padEnd(6), (r.pd||"").padEnd(2),
      ].join("|");
    });
    const blob = new Blob([lines.join("\n")], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `606_${periodo}_${rnc}.txt`; a.click();
    URL.revokeObjectURL(url);
  };

  const cardStyle = { background:"#161b22", padding:"36px", borderRadius:"20px", border:"1px solid #30363d", textAlign:"center" };
  const selectStyle = { background:"#0d1117", color:"#c9d1d9", border:"1px solid #30363d", borderRadius:"6px", padding:"4px 8px", fontSize:"0.75rem" };
  const badgeStyle = { fontSize:"0.72rem", fontWeight:"bold", color:"#58a6ff", background:"#1c2d40", padding:"4px 10px", borderRadius:"20px" };

  return (
    <div style={{ minHeight:"100vh", backgroundColor:"#0d1117", color:"#c9d1d9", padding:"40px", fontFamily:"sans-serif" }}>
      <header style={{ textAlign:"center", marginBottom:"40px" }}>
        <h1 style={{ color:"white", fontSize:"2.2rem", marginBottom:"8px" }}>606 MERGER PRO 🚛</h1>
        <p style={{ opacity:0.6, margin:0 }}>Transporte Amalfi — Unificador de Reportes</p>
      </header>

      {step === 0 ? (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"20px", maxWidth:"860px", margin:"0 auto" }}>
          <div style={cardStyle}>
            <div style={{ fontSize:"2.5rem", marginBottom:"16px" }}>📊</div>
            <h2 style={{ color:"white", marginBottom:"10px" }}>1. DGII (.xls)</h2>
            <p style={{ fontSize:"0.78rem", opacity:0.6, marginBottom:"16px" }}>Archivo previo de la DGII.</p>
            <input type="file" accept=".xls,.xlsx" onChange={handleDGII} style={{ fontSize:"0.78rem", color:"#c9d1d9" }} />
            {dgiiData.length > 0 && <span style={{ color:"#3fb950", fontSize:"0.75rem", marginTop:"8px", display:"block" }}>✅ {dgiiData.length} registros</span>}
          </div>
          <div style={cardStyle}>
            <div style={{ fontSize:"2.5rem", marginBottom:"16px" }}>🚀</div>
            <h2 style={{ color:"white", marginBottom:"10px" }}>2. Alegra (.xlsx)</h2>
            <p style={{ fontSize:"0.78rem", opacity:0.6, marginBottom:"16px" }}>Reporte exportado desde Alegra.</p>
            <input type="file" accept=".xlsx" onChange={handleAlegra} style={{ fontSize:"0.78rem", color:"#c9d1d9" }} />
          </div>
        </div>
      ) : (
        <div style={{ background:"#161b22", borderRadius:"20px", border:"1px solid #30363d", maxWidth:"1100px", margin:"0 auto", padding:"28px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px", flexWrap:"wrap", gap:"12px" }}>
            <div>
              <span style={badgeStyle}>RNC: {rnc}</span>
              <span style={{ ...badgeStyle, marginLeft:"8px" }}>PERÍODO: {periodo}</span>
              <span style={{ ...badgeStyle, marginLeft:"8px" }}>{editRows.length} registros</span>
            </div>
            <div style={{ display:"flex", gap:"10px" }}>
              <button onClick={() => setStep(0)} style={{ background:"#30363d", color:"white", border:"none", padding:"9px 22px", borderRadius:"10px", cursor:"pointer" }}>← Atrás</button>
              <button onClick={generarTXT} style={{ background:"#238636", color:"white", border:"none", padding:"9px 22px", borderRadius:"10px", cursor:"pointer", fontWeight:"bold" }}>⬇ Generar TXT 606</button>
            </div>
          </div>

          <div style={{ marginBottom:"16px", display:"flex", alignItems:"center", gap:"12px" }}>
            <label style={{ fontSize:"0.78rem", opacity:0.7 }}>Tipo de Bien (global):</label>
            <select value={tipoBien} onChange={(e) => { setTipoBien(e.target.value); setEditRows(prev => prev.map(r => ({ ...r, tipoBien: e.target.value }))); }} style={selectStyle}>
              {TIPOS_BIENES.map(t => <option key={t.code} value={t.code}>{t.label}</option>)}
            </select>
          </div>

          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"0.78rem" }}>
              <thead>
                <tr style={{ color:"#8b949e", borderBottom:"2px solid #30363d", textAlign:"left" }}>
                  <th style={{ padding:"10px 14px" }}>RNC</th>
                  <th style={{ padding:"10px 14px" }}>NCF</th>
                  <th style={{ padding:"10px 14px" }}>Tipo Bien</th>
                  <th style={{ padding:"10px 14px" }}>Monto Total</th>
                  <th style={{ padding:"10px 14px" }}>ITBIS</th>
                  <th style={{ padding:"10px 14px" }}>Forma Pago</th>
                  <th style={{ padding:"10px 14px" }}>Fecha Pago</th>
                </tr>
              </thead>
              <tbody>
                {editRows.map((r, i) => (
                  <tr key={i} style={{ borderBottom:"1px solid #21262d" }}>
                    <td style={{ padding:"10px 14px", fontFamily:"monospace" }}>{r.rnc || "—"}</td>
                    <td style={{ padding:"10px 14px", fontWeight:"bold", color:"white" }}>{r.ncf}</td>
                    <td style={{ padding:"10px 14px" }}>
                      <select value={r.tipoBien} onChange={(e) => updateRow(i, "tipoBien", e.target.value)} style={selectStyle}>
                        {TIPOS_BIENES.map(t => <option key={t.code} value={t.code}>{t.code}</option>)}
                      </select>
                    </td>
                    <td style={{ padding:"10px 14px" }}>RD$ {r.tot}</td>
                    <td style={{ padding:"10px 14px" }}>RD$ {r.itbisC}</td>
                    <td style={{ padding:"10px 14px" }}>
                      <select value={r.fp} onChange={(e) => updateRow(i, "fp", e.target.value)} style={selectStyle}>
                        {FORMAS_PAGO.map(f => <option key={f.code} value={f.label}>{f.code}</option>)}
                      </select>
                    </td>
                    <td style={{ padding:"10px 14px", color:"#58a6ff" }}>{r.pd && r.pm ? `${r.pd}/${r.pm}` : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      <footer style={{ textAlign:"center", marginTop:"40px", opacity:0.3, fontSize:"0.75rem" }}>606 Merger Pro · Transporte Amalfi</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
